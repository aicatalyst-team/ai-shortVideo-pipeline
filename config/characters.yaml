# 角色 IP 资产定义
# Phase 3.5: 固定美女 IP 形象，保持跨镜头角色一致性
# R1.1 (W2 D8): 新增 identity / appearance / wardrobe / props / voice / visual_refs 6 类结构化字段
#              2026-05-19 填入建议值，字段可随时覆盖
#
# 使用方式：
#  1. 每个角色需准备参考图（正面+半侧），放入 config/character_refs/
#  2. 参考图建议用 AI 文生图生成后人工筛选面部一致性最好的
#  3. 系统会自动将参考图通过可灵 character_reference 传入生图/生视频 API

default_character: su_wan

su_wan:
  display_name: 苏晚
  description: >
    深栗色长直发及腰，带层次感碎刘海，杏仁色眼眸，心形脸型。
    日常穿搭为白色V领T恤搭驼色针织开衫，简约金色锁骨链,
    气质温柔大方又不失利落感。
  ref_images:
    front: character_refs/su_wan_front.png
    side: character_refs/su_wan_side.png
  visual_tags: >
    young Chinese woman, long straight deep chestnut brown hair with layered bangs,
    almond-shaped warm brown eyes, heart-shaped face, white V-neck tee,
    camel knit cardigan, delicate gold necklace, elegant and warm, natural beauty
  compatible_styles:
    - cyberpunk_military
    - hot_blooded
    - funny_comedy
    - cute_healing
  max_consecutive_shots: 4

