    hair: "深栗色长直发及腰，带层次感碎刘海"
    face: "杏仁色眼眸，心形脸型，皮肤偏暖白"
    body: "身高 163-165cm，纤细修长，姿态优雅"
  wardrobe:
    casual: "白色V领T恤搭驼色针织开衫，简约金色锁骨链"
    formal: "米白色西装外套配纯色衬衫 + 直筒西裤"
    winter: "燕麦色长款大衣 + 米色羊绒围巾 + 棕色长靴"
  props:
